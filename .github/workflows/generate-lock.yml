name: Bootstrap Cargo.lock

on:
  push:
    branches: [main]
    paths: [.github/workflows/generate-lock.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - name: Generate Cargo.lock
        run: cargo generate-lockfile
      - name: Commit lockfile and remove bootstrap workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock
          git rm .github/workflows/generate-lock.yml
          git commit -m "Add reproducible Cargo lockfile"
          git push origin HEAD:main
