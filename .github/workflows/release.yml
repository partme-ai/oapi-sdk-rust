name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      force_release:
        description: Create or update the release even if the version tag already exists
        required: false
        type: boolean
        default: false
      publish_crates:
        description: Publish lark-oapi to crates.io when CARGO_REGISTRY_TOKEN is configured
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: release
        shell: bash
        env:
          FORCE_RELEASE: ${{ inputs.force_release || false }}
        run: |
          set -euo pipefail
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          test -n "$version"
          tag="v${version}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "$tag" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${tag}" >&2
            exit 1
          fi

          should_release=false
          if [[ "${GITHUB_REF_TYPE}" == "tag" || "$FORCE_RELEASE" == "true" ]]; then
            should_release=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify release
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo generate-lockfile
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --all-features --locked
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo package -p lark-oapi --locked

  binaries:
    name: Build ${{ matrix.target }}
    needs: [prepare, verify]
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - run: cargo generate-lockfile
      - name: Build example installer
        run: cargo build --release --locked -p create-an-app-in-one-click-rust --target ${{ matrix.target }}
      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="create-an-app-in-one-click-rust-${{ needs.prepare.outputs.version }}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/create-an-app-in-one-click-rust" "dist/$name/"
          cp README.md README.zh-CN.md LICENSE "dist/$name/"
          tar -C dist -czf "dist/${name}.tar.gz" "$name"
          rm -rf "dist/$name"
      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "create-an-app-in-one-click-rust-${{ needs.prepare.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/create-an-app-in-one-click-rust.exe" "dist/$name/"
          Copy-Item README.md, README.zh-CN.md, LICENSE "dist/$name/"
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip"
          Remove-Item -Recurse -Force "dist/$name"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  github-release:
    name: GitHub Release
    needs: [prepare, verify, binaries]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - run: cargo generate-lockfile
      - name: Build crate package
        run: cargo package -p lark-oapi --locked
      - name: Add crate package and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/package/lark-oapi-${{ needs.prepare.outputs.version }}.crate" dist/
          (cd dist && sha256sum * > SHA256SUMS.txt)
      - name: Create tag when releasing manually
        if: github.ref_type != 'tag'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if ! git rev-parse "${{ needs.prepare.outputs.tag }}" >/dev/null 2>&1; then
            git tag -a "${{ needs.prepare.outputs.tag }}" -m "Release ${{ needs.prepare.outputs.tag }}"
            git push origin "${{ needs.prepare.outputs.tag }}"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true

  crates-io:
    name: Publish crates.io
    needs: [prepare, verify, github-release]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      REQUESTED_PUBLISH: ${{ inputs.publish_crates || false }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - run: cargo generate-lockfile
      - name: Publish lark-oapi
        if: env.CARGO_REGISTRY_TOKEN != '' && (github.ref_type == 'tag' || env.REQUESTED_PUBLISH == 'true')
        run: cargo publish -p lark-oapi --locked --token "$CARGO_REGISTRY_TOKEN"
      - name: Explain skipped publication
        if: env.CARGO_REGISTRY_TOKEN == '' || (github.ref_type != 'tag' && env.REQUESTED_PUBLISH != 'true')
        run: |
          echo "GitHub Release was created, but crates.io publication was skipped."
          echo "Configure the CARGO_REGISTRY_TOKEN repository secret and publish by tag or manual workflow dispatch."
