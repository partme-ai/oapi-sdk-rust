name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo generate-lockfile
      - run: cargo test --workspace --all-features --locked
      - run: cargo build --workspace --all-features --release --locked

  quality:
    name: Format, Clippy, Docs and Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo generate-lockfile
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo doc --workspace --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo package -p lark-oapi --locked

  feature-matrix:
    name: Feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo generate-lockfile
      - run: cargo check -p lark-oapi --no-default-features --features rustls-tls --locked
      - run: cargo check -p lark-oapi --no-default-features --features rustls-tls,registration --locked
      - run: cargo check -p lark-oapi --no-default-features --features rustls-tls,events --locked
      - run: cargo check -p lark-oapi --no-default-features --features native-tls,registration,events --locked
